  <title>Poemas</title>
  <script type="text/javascript">
    // Preserve the original path for the SPA router
    var path = window.location.pathname;
    if (path !== '/poemas/' && path !== '/poemas/index.html') {
      sessionStorage.setItem('redirect', path);
    }
    window.location.replace('/poemas/');
  </script>
